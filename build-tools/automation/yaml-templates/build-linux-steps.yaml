# Shared Linux build steps for both public and private pipelines
# This template contains the actual build logic without references to private repos

parameters:
  buildResultArtifactName: Build Results - Linux
  xaSourcePath: $(System.DefaultWorkingDirectory)/android
  nugetArtifactName: $(LinuxNuGetArtifactName)
  makeMSBuildArgs: ''
  use1ESTemplate: true

steps:
- template: /build-tools/automation/yaml-templates/log-disk-space.yaml

- ${{ if ne(parameters.use1ESTemplate, true) }}:
  - bash: |
      set -e
      sudo apt-get update
      sudo apt-get install -y p7zip-full cmake ninja-build ccache
    displayName: Install build dependencies on Linux

- template: /build-tools/automation/yaml-templates/setup-jdk-variables.yaml
  parameters:
    useAgentJdkPath: false
    jdkMajorVersion: $(LatestJavaSdkMajorVersion)

- template: /build-tools/automation/yaml-templates/use-dot-net.yaml
  parameters:
    remove_dotnet: true

- task: NuGetAuthenticate@1
  displayName: authenticate with azure artifacts
  inputs:
    forceReinstallCredentialProvider: true

- template: /build-tools/automation/yaml-templates/log-disk-space.yaml

- template: /build-tools/automation/yaml-templates/cache-gradle.yaml
  parameters:
    xaSourcePath: ${{ parameters.xaSourcePath }}

- template: /build-tools/automation/yaml-templates/cache-android-archives.yaml
  parameters:
    xaSourcePath: ${{ parameters.xaSourcePath }}

- script: make jenkins PREPARE_CI=1 CONFIGURATION=$(XA.Build.Configuration) MSBUILD_ARGS='${{ parameters.makeMSBuildArgs }}'
  workingDirectory: ${{ parameters.xaSourcePath }}
  displayName: make jenkins
  retryCountOnTaskFailure: 1

- script: make create-nupkgs CONFIGURATION=$(XA.Build.Configuration)
  workingDirectory: ${{ parameters.xaSourcePath }}
  displayName: make create-nupkgs

- template: /build-tools/automation/yaml-templates/log-disk-space.yaml

- task: CopyFiles@2
  inputs:
    SourceFolder: ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-unsigned
    Contents: |
      **/Microsoft.Android.Sdk.Linux*.symbols.nupkg
      **/SignList.xml
    TargetFolder: ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux-symbols

- task: DeleteFiles@1
  inputs:
    SourceFolder: ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-unsigned
    Contents: '*.symbols.nupkg'

- script: >
    df -h &&
    mkdir -p ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux &&
    ln ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-unsigned/Microsoft.Android.Sdk.Linux*.nupkg
    ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux &&
    ln ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-unsigned/SignList.xml
    ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux
  workingDirectory: ${{ parameters.xaSourcePath }}
  displayName: copy linux sdk

- ${{ if ne(parameters.use1ESTemplate, true) }}:
  - task: PublishPipelineArtifact@1
    displayName: upload linux sdk
    inputs:
      artifactName: ${{ parameters.nugetArtifactName }}
      targetPath: ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux

  - task: PublishPipelineArtifact@1
    displayName: upload linux sdk symbols
    inputs:
      artifactName: ${{ parameters.nugetArtifactName }}-symbols
      targetPath: ${{ parameters.xaSourcePath }}/bin/Build$(XA.Build.Configuration)/nuget-linux-symbols

- template: /build-tools/automation/yaml-templates/upload-results.yaml
  parameters:
    xaSourcePath: ${{ parameters.xaSourcePath }}
    artifactName: ${{ parameters.buildResultArtifactName }}
    includeBuildResults: true
    use1ESTemplate: ${{ parameters.use1ESTemplate }}

- template: /build-tools/automation/yaml-templates/fail-on-dirty-tree.yaml
  parameters:
    xaSourcePath: ${{ parameters.xaSourcePath }}

# Public dnceng-public agents are sometimes provisioned with a very small (~29 GB) OS
# disk mounted at '/'. The build fills '/' to ~94% via caches under $HOME, and the
# implicit post-job 'cache Android toolchain archives' step then fails writing its tar
# archive to '/' with a "No space left on device" error, failing the whole job. Note the
# repo working tree (bin/obj) lives on the large /mnt volume, NOT on '/', so deleting it
# does not help. Every pipeline artifact has already been uploaded by this point, so
# reclaim space on '/' by deleting everything under $HOME that the build no longer needs.
# The only things we must keep are the two post-job cache sources: $HOME/android-archives
# (saved by 'cache Android toolchain archives') and $HOME/.gradle (saved by 'cache Gradle
# downloads'). Everything else is disposable here, most importantly $HOME/android-toolchain
# (the extracted SDK/NDK/JDK, ~9 GB) and the NuGet global packages cache.
# Public-only: the 1ES pipeline runs on agents that do not have this small-disk problem.
- ${{ if ne(parameters.use1ESTemplate, true) }}:
  - bash: |
      echo "=== Disk usage (all mounts) before freeing space ==="
      df -h
      echo "=== Largest entries under HOME ($HOME) on the small '/' disk ==="
      du -xhd1 "$HOME" 2>/dev/null | sort -h | tail -20 || true
      for d in "$HOME/android-toolchain" "${NUGET_PACKAGES:-$HOME/.nuget/packages}" "$HOME/.dotnet" "$HOME/.local/share/NuGet" "$HOME/.cache"; do
        echo "Removing $d"
        rm -rf "$d" || true
      done
      echo "=== Disk usage (all mounts) after freeing space ==="
      df -h
    displayName: Free disk space before post-job cache save
    condition: always()
