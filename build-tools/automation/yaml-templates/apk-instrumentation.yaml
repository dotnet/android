parameters:
  buildConfiguration: $(XA.Build.Configuration)
  configuration: $(XA.Build.Configuration)
  xaSourcePath: $(System.DefaultWorkingDirectory)
  testName: ""
  project: ""
  extraBuildArgs: ""
  testResultsFormat: VSTest
  artifactSource: ""
  artifactFolder: ""
  condition: succeeded()

steps:
  # Build and install the APK to the device first, so that ComputeRunArguments
  # can resolve the package name from AndroidManifest.xml.
  #
  # Retry the install up to 3 times: the emulator/ADB connection occasionally
  # drops mid-install (XAGCPU7000 "device offline") and a retry usually recovers.
  # If every attempt fails, continueOnError: false fails the lane immediately -
  # there is no point running the tests against a device where the app was never
  # installed (that only wastes CI time and produces a misleading
  # INSTRUMENTATION_FAILED). See dotnet/android#11830.
- template: /build-tools/automation/yaml-templates/run-dotnet-preview.yaml
  parameters:
    configuration: ${{ parameters.buildConfiguration }}
    xaSourcePath: ${{ parameters.xaSourcePath }}
    displayName: build ${{ parameters.testName }}
    project: ${{ parameters.project }}
    arguments: >-
      -t:Install
      -bl:${{ parameters.xaSourcePath }}/bin/Test${{ parameters.configuration }}/build-${{ parameters.testName }}.binlog
      -c ${{ parameters.configuration }} ${{ parameters.extraBuildArgs }}
    condition: ${{ parameters.condition }}
    retryCountOnTaskFailure: 3
    continueOnError: false

  # Run dotnet test from the project directory so it finds the project-local
  # global.json with "test": { "runner": "Microsoft.Testing.Platform" }.
  # This enables MTP mode, which uses RunCommand/RunArguments to invoke
  # Microsoft.Android.Run for on-device test execution.
- powershell: |
    $projectDir = Split-Path -Parent "${{ parameters.project }}"
    $projectFile = Split-Path -Leaf "${{ parameters.project }}"
    $resultsDir = "${{ parameters.xaSourcePath }}/bin/Test${{ parameters.configuration }}/TestResults"
    Push-Location $projectDir
    if ([Environment]::OSVersion.Platform -eq "Unix") {
        $DOTNET_ROOT = "${{ parameters.xaSourcePath }}/bin/${{ parameters.buildConfiguration }}/dotnet"
        $env:PATH = "${DOTNET_ROOT}:$env:PATH"
        $dotnetPath = "${DOTNET_ROOT}/dotnet"
    } else {
        $DOTNET_ROOT = "${{ parameters.xaSourcePath }}\bin\${{ parameters.buildConfiguration }}\dotnet"
        $env:PATH = "${DOTNET_ROOT};$env:PATH"
        $dotnetPath = "${DOTNET_ROOT}\dotnet.exe"
    }
    & $dotnetPath test $projectFile --no-build -bl:${{ parameters.xaSourcePath }}/bin/Test${{ parameters.configuration }}/run-${{ parameters.testName }}.binlog -c ${{ parameters.configuration }} --results-directory $resultsDir --report-trx --report-trx-filename ${{ parameters.testName }}.trx ${{ parameters.extraBuildArgs }}
    Pop-Location
  displayName: run ${{ parameters.testName }}
  condition: ${{ parameters.condition }}
  continueOnError: true

- script: >
    DEST="$(Build.StagingDirectory)/Test${{ parameters.configuration }}/${{ parameters.artifactFolder }}/" &&
    mkdir -p "$DEST" &&
    cp "${{ parameters.artifactSource }}" "$DEST" ||
    echo "copy apk/aab failed"  # We don't need to report the error
  displayName: copy apk/aab
  condition: ne(variables['Agent.JobStatus'], 'Succeeded')
  continueOnError: true

  # Always capture full device logcat so we can diagnose native library load
  # failures, JNI crashes, instrumentation errors, etc. The Android-side
  # instrumentation output (Log.Info/Log.Error from TestInstrumentation) and
  # any UnsatisfiedLinkError / dlopen messages only appear in logcat.
  #
  # Use succeededOrFailed() (not the default succeeded()) so we still capture
  # logcat when an earlier step failed - in particular a failed -t:Install, which
  # now fails the lane fast. Losing logcat in exactly that "device offline" case
  # would defeat the diagnostics this template exists for. See dotnet/android#11830.
- script: >
    DEST="$(Build.StagingDirectory)/Test${{ parameters.configuration }}/${{ parameters.artifactFolder }}/" &&
    mkdir -p "$DEST" &&
    adb logcat -d > "$DEST/logcat-${{ parameters.testName }}.txt" ||
    echo "logcat capture failed"
  displayName: capture logcat ${{ parameters.testName }}
  condition: succeededOrFailed()
  continueOnError: true

- task: PublishTestResults@2
  displayName: publish ${{ parameters.testName }} results
  inputs:
    testResultsFormat: ${{ parameters.testResultsFormat }}
    testResultsFiles: ${{ parameters.xaSourcePath }}/bin/Test${{ parameters.configuration }}/TestResults/${{ parameters.testName }}.trx
    testRunTitle: ${{ parameters.testName }}
  condition: ${{ parameters.condition }}

- template: /build-tools/automation/yaml-templates/run-dotnet-preview.yaml
  parameters:
    configuration: ${{ parameters.buildConfiguration }}
    xaSourcePath: ${{ parameters.xaSourcePath }}
    project: ${{ parameters.project }}
    arguments: -t:Clean -c ${{ parameters.configuration }} --no-restore ${{ parameters.extraBuildArgs }}
    displayName: Clean ${{ parameters.testName }}
    condition: ${{ parameters.condition }}
    continueOnError: false
