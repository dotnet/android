# xamarin-android-tools tests stage
#
# Builds the in-tree Android tools projects and runs their unit tests.
#
# This stage does not pack a NuGet or publish binaries because dotnet/android's
# product build produces the shipping assemblies. Only logs and test results are
# surfaced.
#
# Referenced from both:
#   - build-tools/automation/azure-pipelines.yaml         (official / 1ES)
#   - build-tools/automation/azure-pipelines-public.yaml  (public PR validation)

parameters:
- name: stageName
  type: string
  default: xamarin_android_tools_tests
- name: dependsOn
  type: object
  default: []
- name: condition
  type: string
  default: succeeded()
- name: use1ESTemplate
  type: boolean
  default: false
- name: windowsPool
  type: object
  # NOTE: This default is a Microsoft-hosted Azure Pipelines pool, which is NOT
  # allowed by 1ES Pipeline Templates in Official mode. Callers that extend the
  # 1ES Official template (e.g. build-tools/automation/azure-pipelines.yaml) must
  # override this with a 1ES-hosted pool like `MAUI-1ESPT`.
  default:
    name: Azure Pipelines
    vmImage: $(HostedWinImage)
    os: windows
- name: macPool
  type: object
  default:
    name: Azure Pipelines
    vmImage: $(HostedMacImage)
    os: macOS

stages:
- stage: ${{ parameters.stageName }}
  displayName: Android Tools Tests
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  variables:
    DotNetCoreVersion: $(DotNetSdkVersion).x
    XatBuildProperties: -p:AndroidToolsDisableMultiTargeting=false -p:DotNetTargetFrameworkVersion=$(DotNetSdkVersion)
  jobs:

  # Check - "Xamarin.Android (Android Tools Tests Windows - .NET)"
  - job: xamarin_android_tools_windows
    displayName: Windows - .NET
    pool: ${{ parameters.windowsPool }}
    timeoutInMinutes: 30
    workspace:
      clean: all
    ${{ if eq(parameters.use1ESTemplate, true) }}:
      templateContext:
        outputs:
        - output: pipelineArtifact
          displayName: Upload build logs
          condition: always()
          targetPath: $(Build.ArtifactStagingDirectory)
          artifactName: android-tools-logs-windows
          sbomEnabled: false
    steps:
    - checkout: self
      clean: true

    - task: UseDotNet@2
      displayName: Use .NET Core $(DotNetCoreVersion)
      inputs:
        version: $(DotNetCoreVersion)

    - task: DotNetCoreCLI@2
      displayName: Build Android tools projects
      inputs:
        command: build
        projects: |
          $(System.DefaultWorkingDirectory)/src/Xamarin.Android.Tools.AndroidSdk/Xamarin.Android.Tools.AndroidSdk.csproj
          $(System.DefaultWorkingDirectory)/tests/Xamarin.Android.Tools.Benchmarks/Xamarin.Android.Tools.Benchmarks.csproj
          $(System.DefaultWorkingDirectory)/tools/ls-jdks/ls-jdks.csproj
        arguments: -c Debug $(XatBuildProperties) -bl:$(Build.ArtifactStagingDirectory)/build-windows.binlog

    - task: DotNetCoreCLI@2
      displayName: Run Tests
      inputs:
        command: test
        projects: |
          $(System.DefaultWorkingDirectory)/tests/Microsoft.Android.Build.BaseTasks-Tests/Microsoft.Android.Build.BaseTasks-Tests.csproj
          $(System.DefaultWorkingDirectory)/tests/Xamarin.Android.Tools.AndroidSdk-Tests/Xamarin.Android.Tools.AndroidSdk-Tests.csproj
        arguments: -c Debug $(XatBuildProperties)

    - ${{ if eq(parameters.use1ESTemplate, false) }}:
      - task: PublishBuildArtifacts@1
        displayName: Upload build logs
        condition: always()
        inputs:
          pathToPublish: $(Build.ArtifactStagingDirectory)
          artifactName: android-tools-logs-windows

  # Check - "Xamarin.Android (Android Tools Tests Mac - .NET)"
  - job: xamarin_android_tools_mac
    displayName: Mac - .NET
    pool: ${{ parameters.macPool }}
    timeoutInMinutes: 30
    workspace:
      clean: all
    ${{ if eq(parameters.use1ESTemplate, true) }}:
      templateContext:
        outputs:
        - output: pipelineArtifact
          displayName: Upload build logs
          condition: always()
          targetPath: $(Build.ArtifactStagingDirectory)
          artifactName: android-tools-logs-mac
          sbomEnabled: false
    steps:
    - checkout: self
      clean: true

    - task: UseDotNet@2
      displayName: Use .NET Core $(DotNetCoreVersion)
      inputs:
        version: $(DotNetCoreVersion)

    - task: DotNetCoreCLI@2
      displayName: Build Android tools projects
      inputs:
        command: build
        projects: |
          $(System.DefaultWorkingDirectory)/src/Xamarin.Android.Tools.AndroidSdk/Xamarin.Android.Tools.AndroidSdk.csproj
          $(System.DefaultWorkingDirectory)/tests/Xamarin.Android.Tools.Benchmarks/Xamarin.Android.Tools.Benchmarks.csproj
          $(System.DefaultWorkingDirectory)/tools/ls-jdks/ls-jdks.csproj
        arguments: -c Debug $(XatBuildProperties) -bl:$(Build.ArtifactStagingDirectory)/build-mac.binlog

    - task: DotNetCoreCLI@2
      displayName: Run Tests
      inputs:
        command: test
        projects: |
          $(System.DefaultWorkingDirectory)/tests/Microsoft.Android.Build.BaseTasks-Tests/Microsoft.Android.Build.BaseTasks-Tests.csproj
          $(System.DefaultWorkingDirectory)/tests/Xamarin.Android.Tools.AndroidSdk-Tests/Xamarin.Android.Tools.AndroidSdk-Tests.csproj
        arguments: -c Debug $(XatBuildProperties)

    - ${{ if eq(parameters.use1ESTemplate, false) }}:
      - task: PublishBuildArtifacts@1
        displayName: Upload build logs
        condition: always()
        inputs:
          pathToPublish: $(Build.ArtifactStagingDirectory)
          artifactName: android-tools-logs-mac
