parameters:
  project:
  xaSourcePath:
  logsDirectory:
  payloadDirectory: $(Build.StagingDirectory)/MauiFullR2RHelix
  packageName: com.xamarin.mauifullr2r
  extraBuildArguments: ''

steps:
- powershell: |
    $project = '${{ parameters.project }}'
    [xml] $xml = Get-Content $project

    function Set-Property([string] $name, [string] $value) {
      $node = $xml.SelectSingleNode("/Project/PropertyGroup/$name")
      if (-not $node) {
        $propertyGroup = $xml.SelectSingleNode('/Project/PropertyGroup')
        if (-not $propertyGroup) {
          $propertyGroup = $xml.CreateElement('PropertyGroup')
          $xml.Project.AppendChild($propertyGroup) | Out-Null
        }
        $node = $xml.CreateElement($name)
        $propertyGroup.AppendChild($node) | Out-Null
      }
      $node.InnerText = $value
    }

    Set-Property 'ApplicationId' '${{ parameters.packageName }}'
    Set-Property 'RuntimeIdentifier' 'android-arm'
    Set-Property 'UseMonoRuntime' 'false'
    Set-Property 'PublishReadyToRun' 'true'
    Set-Property 'PublishReadyToRunComposite' 'true'
    Set-Property '_MauiPublishReadyToRunPartial' 'false'
    Set-Property 'AndroidPackageFormat' 'apk'

    # Assert that $(_MauiPublishReadyToRunPartial)=false disables MAUI's partial
    # ReadyToRun inputs, so the test exercises full R2R coverage.
    @(
      'DisablePartialReadyToRunForFullR2RTest',
      'AssertFullReadyToRunForFullR2RTest'
    ) | ForEach-Object {
      $existing = $xml.SelectSingleNode("/Project/Target[@Name='$_']")
      if ($existing) {
        $existing.ParentNode.RemoveChild($existing) | Out-Null
      }
    }

    $assertTarget = $xml.CreateElement('Target')
    $assertTarget.SetAttribute('Name', 'AssertFullReadyToRunForFullR2RTest')
    $assertTarget.SetAttribute('BeforeTargets', '_CreateR2RImages')

    $assertItemGroup = $xml.CreateElement('ItemGroup')
    $partialItem = $xml.CreateElement('_PartialReadyToRunCompileList')
    $partialItem.SetAttribute('Include', '@(_ReadyToRunCompileList)')
    $partialItem.SetAttribute('Condition', "'%(_ReadyToRunCompileList.PartialCompile)' == 'true'")
    $assertItemGroup.AppendChild($partialItem) | Out-Null
    $assertTarget.AppendChild($assertItemGroup) | Out-Null

    $error = $xml.CreateElement('Error')
    $error.SetAttribute('Condition', "'@(_PartialReadyToRunCompileList)' != ''")
    $error.SetAttribute('Text', "Full ReadyToRun test expected no partial ReadyToRun inputs with `$(_MauiPublishReadyToRunPartial)=false`, but found '@(_PartialReadyToRunCompileList)'.")
    $assertTarget.AppendChild($error) | Out-Null
    $compositeRootsError = $xml.CreateElement('Error')
    $compositeRootsError.SetAttribute('Condition', "'@(_ReadyToRunCompositeUnrootedBuildInput)' != ''")
    $compositeRootsError.SetAttribute('Text', "Full ReadyToRun test expected no unrooted composite ReadyToRun inputs with `$(_MauiPublishReadyToRunPartial)=false`, but found '@(_ReadyToRunCompositeUnrootedBuildInput)'.")
    $assertTarget.AppendChild($compositeRootsError) | Out-Null
    $xml.Project.AppendChild($assertTarget) | Out-Null

    $xml.Save($project)
  displayName: Configure MAUI full R2R android-arm test

- template: /build-tools/automation/yaml-templates/run-dotnet-preview.yaml
  parameters:
    project: ${{ parameters.project }}
    arguments: >-
      -f $(DotNetTargetFramework)-android -c Release
      -p:RuntimeIdentifier=android-arm
      -p:UseMonoRuntime=false
      -p:PublishReadyToRun=true
      -p:PublishReadyToRunComposite=true
      -p:_MauiPublishReadyToRunPartial=false
      -p:AndroidPackageFormat=apk
      ${{ parameters.extraBuildArguments }}
      -bl:${{ parameters.logsDirectory }}/MauiTestProj-FullR2R-android-arm.binlog
    xaSourcePath: ${{ parameters.xaSourcePath }}
    displayName: Build MAUI template - Full R2R android-arm
    continueOnError: false

- powershell: |
    $project = '${{ parameters.project }}'
    $projectDirectory = Split-Path -Parent $project
    $payloadDirectory = '${{ parameters.payloadDirectory }}'
    $packageName = '${{ parameters.packageName }}'

    New-Item -ItemType Directory -Force -Path $payloadDirectory | Out-Null
    $apk = Get-ChildItem $projectDirectory -Recurse -Filter '*-Signed.apk' |
      Where-Object { $_.FullName -like '*\bin\Release\*android-arm*' } |
      Sort-Object LastWriteTime -Descending |
      Select-Object -First 1
    if (-not $apk) {
      throw "Could not find the android-arm signed APK under $projectDirectory"
    }

    Copy-Item -LiteralPath $apk.FullName -Destination (Join-Path $payloadDirectory 'MauiFullR2R-Signed.apk') -Force

    $script = @"
    @echo on
    setlocal
    set "UPLOAD_DIR=%HELIX_WORKITEM_UPLOAD_ROOT%"
    if "%UPLOAD_DIR%"=="" set "UPLOAD_DIR=%~dp0"
    if not exist "%UPLOAD_DIR%" mkdir "%UPLOAD_DIR%"
    where adb
    adb devices -l
    adb wait-for-device
    adb uninstall $packageName
    adb install -r "%~dp0MauiFullR2R-Signed.apk" || exit /b 1
    adb shell logcat -c
    adb shell monkey -p $packageName -c android.intent.category.LAUNCHER 1 || exit /b 1
    ping -n 11 127.0.0.1 > nul
    adb shell pidof $packageName
    if errorlevel 1 (
      adb logcat -d > "%UPLOAD_DIR%\logcat.log"
      adb uninstall $packageName
      exit /b 1
    )
    adb logcat -d > "%UPLOAD_DIR%\logcat.log"
    adb uninstall $packageName
    exit /b 0
    "@

    Set-Content -LiteralPath (Join-Path $payloadDirectory 'run-maui-full-r2r.cmd') -Value $script -Encoding ASCII
  displayName: Prepare MAUI full R2R Helix payload

- powershell: >
    & "${{ parameters.xaSourcePath }}/eng/common/msbuild.ps1"
    "${{ parameters.xaSourcePath }}/eng/common/helixpublish.proj"
    /restore
    /p:TreatWarningsAsErrors=false
    /t:Test
    /bl:${{ parameters.logsDirectory }}/SendMauiFullR2RToHelix.binlog
  displayName: Run MAUI full R2R android-arm APK on Helix
  env:
    BuildConfig: $(XA.Build.Configuration)
    HelixSource: pr/dotnet/android
    HelixType: tests/android/maui-full-r2r/
    HelixBuild: $(Build.BuildNumber)
    HelixConfiguration: android-arm
    HelixTargetQueues: windows.11.amd64.android-armel.open
    HelixAccessToken: ''
    WorkItemDirectory: ${{ parameters.payloadDirectory }}
    WorkItemCommand: run-maui-full-r2r.cmd
    WorkItemTimeout: 00:10:00
    WaitForWorkItemCompletion: true
    Creator: dotnet-android
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
