parameters:
  condition: succeeded()

steps:
- pwsh: |
    $gradle = Get-Command gradle -CommandType Application -ErrorAction Stop | Select-Object -First 1
    Write-Host "Using preinstalled Gradle: $($gradle.Source)"
    Write-Host "##vso[task.setvariable variable=GradleWPath]$($gradle.Source)"
  displayName: Use preinstalled Gradle

- task: DotNetCoreCLI@2
  displayName: Prepare Solution
  inputs:
    projects: external/Java.Interop/Java.Interop.sln
    arguments: '-c $(Build.Configuration) -target:Prepare'
    workingDirectory: external/Java.Interop

- task: DotNetCoreCLI@2
  displayName: Shut down existing build server
  inputs:
    command: custom
    custom: build-server
    arguments: shutdown
    workingDirectory: external/Java.Interop

- task: DotNetCoreCLI@2
  displayName: Build Solution
  inputs:
    projects: external/Java.Interop/Java.Interop.sln
    arguments: '-c $(Build.Configuration)'
    workingDirectory: external/Java.Interop
