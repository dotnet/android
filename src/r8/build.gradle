apply plugin: 'java'
apply plugin: 'idea'

java {
    ext.javaSourceVer = project.hasProperty('javaSourceVer') ? JavaVersion.toVersion(project.getProperty('javaSourceVer')) : JavaVersion.VERSION_1_8
    ext.javaTargetVer = project.hasProperty('javaTargetVer') ? JavaVersion.toVersion(project.getProperty('javaTargetVer')) : JavaVersion.VERSION_1_8

    sourceCompatibility = ext.javaSourceVer
    targetCompatibility = ext.javaTargetVer
}

repositories {
    google()
    mavenCentral()
    // R8 patch releases newer than what is published to maven.google.com
    // are available here. See: https://r8.googlesource.com/r8/#replacing-r8-in-agp
    maven {
        url 'https://storage.googleapis.com/r8-releases/raw'
    }
}

dependencies {
    // 9.1.43 contains the fix for the NullPointerException in
    // AndroidApiLevelCompute.of() when --no-tree-shaking is passed.
    // See: https://issuetracker.google.com/issues/524775142
    // See: https://github.com/dotnet/android/issues/11672
    implementation 'com.android.tools:r8:9.1.43'
}

jar {
    duplicatesStrategy = 'exclude'
    manifest {
        attributes 'Main-Class': 'com.android.tools.r8.R8'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    archiveFileName.set('r8.jar')
}