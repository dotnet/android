// Repo-wide Maven repository configuration for all Gradle projects in this repo.
//
// Maven dependencies resolve through the dnceng Azure Artifacts feed
// (dotnet-public-maven), which proxies Maven Central, Google Maven, and the
// Gradle Plugin Portal. This keeps CI (CFSClean network isolation, see
// https://aka.ms/1es/netiso/CFS) and local builds on the same single source
// of packages.
//
// IMPORTANT: New packages must be ingested into the feed before they can be
// resolved. After adding or updating dependencies, ingest them into the feed.
//
// Usage from any build.gradle:
//
//     apply from: "${rootDir}/../../eng/gradle/repositories.gradle"
//
//     repositories {
//         gradle.ext.dotnetPublicMaven(delegate)
//     }

gradle.ext.dotnetPublicMaven = { handler ->
    handler.maven {
        url = 'https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public-maven/maven/v1'
        name = 'dotnet-public-maven'
    }
}
